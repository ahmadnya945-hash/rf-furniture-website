    }

</head>

<body>

<h1>RF Furniture</h1>
<p>Selamat datang di toko furniture kami</p>

<h2>Katalog</h2>

<div class="container">

  </div>

  <div class="card">
    <img src="1000413367 (1).png">
    <p>Meja Makan</p>
  </div>

  <div class="card">

  </div>

</div>

</html>
